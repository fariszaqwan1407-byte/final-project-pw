<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAMERA</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
  text-transform:uppercase;
}

body{
  background: linear-gradient(135deg,#ffc0cb,#ffe4ec);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

/* frame */
.wrapper{
  width:100%;
  max-width:420px;
  height:100vh;
  position:relative;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

/* camera */
video{
  width:100%;
  height:100%;
  object-fit:cover;
  filter: brightness(1.05) contrast(1.1) saturate(1.1) blur(0.3px);
}

/* overlay UI */
.ui{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

/* top buttons */
.topbar{
  display:flex;
  justify-content:space-between;
  padding:15px;
}

.btn-small{
  background:rgba(255,255,255,0.7);
  border:none;
  padding:8px 10px;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

/* capture */
.capture{
  width:70px;
  height:70px;
  border-radius:50%;
  border:4px solid white;
  background:rgba(255,105,180,0.8);
  margin-bottom:20px;
  cursor:pointer;
  animation: pulse 1.5s infinite;
}

/* bottom bar */
.bottombar{
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  padding-bottom:20px;
}

.hashtag{
  font-size:12px;
  color:white;
  opacity:0.9;
  margin-top:10px;
}

/* preview */
.preview{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:none;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.7);
}

.preview img{
  width:90%;
  border-radius:15px;
}

/* animations */
@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.1);}
  100%{transform:scale(1);}
}
</style>

</head>

<body>

<div class="wrapper">

  <video id="video" autoplay playsinline></video>

  <div class="ui">

    <div class="topbar">
      <button class="btn-small" onclick="switchCam()">FRONT / REAR</button>
      <button class="btn-small" onclick="retake()">RETAKE</button>
    </div>

    <div class="bottombar">
      <button class="capture" onclick="capture()"></button>
      <div class="hashtag">#1SHAFDIBELAKANGFARIS</div>
    </div>

  </div>

  <!-- preview -->
  <div class="preview" id="preview">
    <img id="photo">
    <button class="btn-small" onclick="next()">NEXT</button>
  </div>

</div>

<script>

let video = document.getElementById("video");
let stream;
let usingFront = true;

async function startCamera(){
  stream = await navigator.mediaDevices.getUserMedia({
    video:{ facingMode: usingFront ? "user" : "environment" },
    audio:false
  });

  video.srcObject = stream;
}

function switchCam(){
  usingFront = !usingFront;
  if(stream){
    stream.getTracks().forEach(t => t.stop());
  }
  startCamera();
}

function capture(){
  const canvas = document.createElement("canvas");
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const ctx = canvas.getContext("2d");
  ctx.drawImage(video,0,0);

  const image = canvas.toDataURL("image/jpeg");

  document.getElementById("photo").src = image;
  document.getElementById("preview").style.display = "flex";

  localStorage.setItem("photo", image);
}

function retake(){
  document.getElementById("preview").style.display = "none";
}

function next(){
  window.location.href = "frame.html";
}

startCamera();

</script>

</body>
</html>
